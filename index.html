<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏛️ Super Minds 4 — Unit 1: In the Museum</title>
<style>
:root{--gold:#c9a227;--navy:#1a2e5a;--bg:#fdf6e3;--card:#fffdf7;--green:#1e6e30;--red:#922020;--blue:#1a3a8e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:#2d2d2d;min-height:100vh;}
header{background:linear-gradient(160deg,#0d1b3e,#1a2e5a,#243b6e);color:#fff;padding:24px 20px;text-align:center;border-bottom:4px solid var(--gold);}
header h1{font-size:clamp(1.5em,5vw,2.4em);color:var(--gold);margin-bottom:4px;}
header p{font-size:.9em;color:rgba(255,255,255,.7);}
.sticky{position:sticky;top:0;z-index:100;background:#3d2a0f;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.score-badge{background:rgba(201,162,39,.2);border:2px solid var(--gold);border-radius:20px;padding:4px 12px;color:var(--gold);font-weight:700;font-size:.9em;}
.tabs{display:flex;flex-wrap:wrap;gap:3px;}
.tab{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.08);color:#fff;font-size:.72em;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.tab:hover{background:rgba(255,255,255,.2);}
.tab.active{border-color:#fff;box-shadow:0 0 6px rgba(255,255,255,.5);}
.tab.done{background:var(--gold);border-color:var(--gold);color:#1a1a2e;}
main{max-width:860px;margin:12px auto 40px;padding:0 14px;}
.ex{display:none;background:var(--card);border-radius:14px;border:2px solid rgba(201,162,39,.25);box-shadow:0 4px 20px rgba(0,0,0,.08);margin-top:12px;overflow:hidden;animation:fadeIn .3s ease;}
.ex.show{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.ex-head{background:linear-gradient(135deg,var(--navy),#2a4a8e);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;}
.ex-num{background:var(--gold);color:#1a1a2e;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.ex-head h2{font-size:1.05em;color:var(--gold);}
.ex-head small{font-size:.8em;color:rgba(255,255,255,.6);display:block;}
.ex-body{padding:18px;}
.audio-wrap{margin-bottom:14px;}
.audio-wrap audio{width:100%;border-radius:8px;}
.audio-label{font-size:.8em;color:#888;margin-bottom:4px;}
.instruct{background:#edf2ff;border-left:4px solid var(--blue);border-radius:0 8px 8px 0;padding:9px 12px;font-size:.88em;color:var(--blue);margin-bottom:14px;line-height:1.5;}
.fb{margin-top:10px;padding:10px 14px;border-radius:8px;font-weight:600;font-size:.88em;display:none;line-height:1.4;}
.fb.ok{background:#e8f5e9;color:var(--green);border:2px solid #a5d6a7;display:block;}
.fb.part{background:#fff8e1;color:#856404;border:2px solid #ffe082;display:block;}
.fb.bad{background:#ffebee;color:var(--red);border:2px solid #ef9a9a;display:block;}
.btn{background:linear-gradient(135deg,var(--navy),#2a4a8e);color:#fff;border:none;border-radius:22px;padding:9px 22px;font-size:.9em;font-weight:700;cursor:pointer;transition:all .2s;margin-top:10px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(26,58,110,.3);}
.nav{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid #eee;}
.nav-btn{background:transparent;border:2px solid var(--gold);color:#5c3d1a;border-radius:18px;padding:7px 16px;cursor:pointer;font-size:.88em;font-weight:600;transition:all .2s;}
.nav-btn:hover{background:var(--gold);color:#1a1a2e;}
.nav-btn.fwd{background:var(--gold);color:#1a1a2e;}
/* Exercise-specific styles */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px;}
.vocab-card{background:#f0f4ff;border:2px solid #bdd4ff;border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all .2s;}
.vocab-card:hover{border-color:var(--blue);transform:scale(1.03);}
.vocab-card .emoji{font-size:1.8em;display:block;margin-bottom:4px;}
.vocab-card .word{font-weight:700;color:var(--navy);font-size:.9em;}
.vocab-card.revealed .word{color:var(--green);}
.spell-area{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;justify-content:center;}
.spell-slot{width:38px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3em;font-weight:700;border:2px dashed #ccc;background:#f9f9f9;transition:all .2s;}
.spell-slot.filled{border:2px solid var(--green);background:#e8f5e9;color:var(--green);}
.spell-slot.wrong{border:2px solid var(--red);background:#ffebee;color:var(--red);animation:shake .4s;}
.spell-slot.space{width:14px;border:none;background:transparent;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.letter-bank{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:8px 0;}
.letter-btn{width:36px;height:36px;border-radius:8px;background:#fff;border:2px solid #ddd;color:#333;font-size:1.1em;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.letter-btn:hover{border-color:var(--gold);background:#fff8e1;}
.letter-btn.used{opacity:.25;pointer-events:none;}
.mc-item{background:#f9f9f9;border:2px solid #e8e8e8;border-radius:10px;padding:11px 13px;margin-bottom:9px;}
.mc-item.ok{border-color:#81c784;background:#e8f5e9;}
.mc-item.bad{border-color:#ef9a9a;background:#ffebee;}
.mc-q{font-size:.9em;font-weight:600;margin-bottom:7px;line-height:1.4;}
.mc-opts{display:flex;flex-wrap:wrap;gap:6px;}
.mc-opt{background:#fff;border:2px solid #ccc;border-radius:18px;padding:4px 13px;cursor:pointer;font-size:.85em;transition:all .2s;}
.mc-opt:hover{border-color:var(--blue);}
.mc-opt.sel{background:var(--blue);color:#fff;border-color:var(--blue);}
.mc-opt.right{background:var(--green);color:#fff;border-color:var(--green);}
.mc-opt.wrong{background:var(--red);color:#fff;border-color:var(--red);}
.gap-sentence{background:#f9f9f9;border:2px solid #e8e8e8;border-radius:10px;padding:10px 13px;margin-bottom:8px;font-size:.9em;line-height:1.6;}
.gap-input{border:none;border-bottom:2px solid var(--gold);background:rgba(201,162,39,.08);padding:2px 8px;font-size:.95em;width:100px;text-align:center;outline:none;font-family:inherit;border-radius:3px;}
.gap-input:focus{border-color:var(--blue);}
.gap-input.ok{border-color:var(--green);background:#e8f5e9;}
.gap-input.bad{border-color:var(--red);background:#ffebee;}
.sort-container{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0;}
.sort-box{background:#f5f5f5;border:2px dashed #ccc;border-radius:12px;padding:12px;min-height:80px;text-align:center;}
.sort-box h4{font-size:.82em;color:var(--navy);margin-bottom:8px;}
.sort-tag{display:inline-block;background:var(--navy);color:#fff;border-radius:16px;padding:3px 10px;font-size:.82em;margin:2px;}
.word-bank{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.wb-btn{background:var(--gold);color:#1a1a2e;border:none;border-radius:18px;padding:5px 12px;font-size:.85em;font-weight:600;cursor:pointer;transition:all .2s;}
.wb-btn:hover{background:#9e7b10;color:#fff;}
.wb-btn.used{opacity:.25;pointer-events:none;}
.wb-btn.sel{outline:3px solid var(--navy);}
.story-text{background:#f9f7f0;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:.88em;line-height:1.7;border-left:4px solid var(--gold);max-height:250px;overflow-y:auto;}
.tf-row{display:flex;align-items:center;gap:8px;background:#f9f9f9;border:2px solid #e8e8e8;border-radius:8px;padding:8px 11px;margin-bottom:6px;}
.tf-row.ok{border-color:#81c784;background:#e8f5e9;}
.tf-row.bad{border-color:#ef9a9a;background:#ffebee;}
.tf-q{flex:1;font-size:.86em;line-height:1.4;}
.tf-btn{width:30px;height:30px;border-radius:50%;font-weight:700;font-size:.72em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.tf-t{border:2px solid var(--green);color:var(--green);background:#fff;}
.tf-f{border:2px solid var(--red);color:var(--red);background:#fff;}
.tf-t:hover,.tf-t.on{background:var(--green);color:#fff;}
.tf-f:hover,.tf-f.on{background:var(--red);color:#fff;}
#results{display:none;text-align:center;padding:30px;background:var(--card);border-radius:14px;border:2px solid rgba(201,162,39,.3);margin-top:12px;}
.r-icon{font-size:4em;display:block;margin-bottom:12px;}
.r-title{font-size:1.8em;color:var(--gold);margin-bottom:8px;}
.r-score{font-size:1.4em;color:var(--navy);margin-bottom:6px;}
.r-stars{font-size:2em;margin-bottom:6px;}
.r-msg{color:#555;margin-bottom:20px;}
@media(max-width:500px){.vocab-grid{grid-template-columns:repeat(2,1fr);}.sort-container{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
<h1>🏛️ Unit 1: In the Museum</h1>
<p>Super Minds 4 · CD1 Tracks 14–25 · Practice Activities</p>
</header>
<div class="sticky">
<div class="score-badge">✅ <span id="sc">0</span>/10</div>
<div class="tabs" id="tabs"></div>
</div>
<main id="main"></main>
<div id="results" style="max-width:860px;margin:12px auto;padding:0 14px;">
<span class="r-icon" id="ri"></span>
<div class="r-title" id="rt"></div>
<div class="r-stars" id="rs"></div>
<div class="r-score" id="rsc"></div>
<div class="r-msg" id="rm"></div>
<button class="btn" onclick="location.reload()">🔄 Try Again</button>
</div>

<script>
// ═══════════════════════════════════════
// DATA based on actual audio transcriptions
// ═══════════════════════════════════════
const EXERCISES = [
  // 1: Track 14 - Vocabulary words
  { track:14, title:"Vocabulary: Listen & Spell", page:"Student's Book p.10",
    type:"spell", words:["queen","knight","crown","helmet","necklace","bracelet","belt","shield","bow and arrow","sword"] },
  // 2: Track 16 - must/mustn't
  { track:16, title:"Grammar: must / mustn't", page:"Student's Book p.11",
    type:"mc", items:[
      {q:"You ___ wear a helmet when you ride a bike.", opts:["must","mustn't","can"], ans:"must"},
      {q:"You ___ swim here. It's dangerous!", opts:["must","mustn't","can"], ans:"mustn't"},
      {q:"You ___ be quiet in the museum.", opts:["must","mustn't","don't"], ans:"must"},
      {q:"You ___ touch the exhibits.", opts:["must","mustn't","can"], ans:"mustn't"},
      {q:"You ___ run in the corridors.", opts:["must","mustn't","can"], ans:"mustn't"},
      {q:"You ___ listen to the guide.", opts:["must","mustn't","don't"], ans:"must"},
    ]},
  // 3: Track 18 - Song (listen)
  { track:18, title:"Song: Listen & Enjoy", page:"Student's Book p.12",
    type:"listen", text:"Listen to the song carefully. How many museum objects can you hear? After listening, click the objects mentioned in the song.",
    objects:["crown","shield","helmet","sword","necklace","belt","bow and arrow"],
    distractors:["bicycle","computer","telephone"] },
  // 4: Track 19 - Give + pronoun + object
  { track:19, title:"Grammar: Give + pronoun + object", page:"Student's Book p.13",
    type:"gap", sentences:[
      {pre:"Give", gap:"us", post:"the coats, please."},
      {pre:"Give", gap:"him", post:"the shield, please."},
      {pre:"Give", gap:"me", post:"the crown, please."},
      {pre:"Give", gap:"her", post:"the necklace, please."},
      {pre:"Give", gap:"them", post:"the swords, please."},
    ]},
  // 5: Track 20 - Practice give sentences
  { track:20, title:"Practice: Give + pronoun", page:"Student's Book p.13",
    type:"match", pairs:[
      {obj:"the book", pron:"me"},
      {obj:"the apple", pron:"her"},
      {obj:"the camera", pron:"him"},
      {obj:"the pencils", pron:"us"},
      {obj:"the sandwiches", pron:"them"},
    ]},
  // 6: Track 21 - Story comprehension
  { track:21, title:"Story: The Explorers", page:"Student's Book pp.14-15",
    type:"tf", intro:"Listen to the story about the Explorers and the knight, then answer True or False.",
    items:[
      {q:"The knight had a sword.", ans:true},
      {q:"The children decided to run away from the knight.", ans:true},
      {q:"Buster the dog helped them.", ans:true},
      {q:"The first symbol was on the knight's helmet.", ans:false},
      {q:"The rhyme line was: 'Behind the picture in the frame.'", ans:true},
      {q:"Horax felt happy at the end.", ans:false},
    ]},
  // 7: Track 22 - Pronunciation ow
  { track:22, title:"Pronunciation: The 'ow' sound", page:"Student's Book p.15",
    type:"listen_repeat", text:"Listen and repeat the 'ow' sound. Can you hear it in these words? Practice saying them aloud!",
    words:["bow","crown","how","now","town","flower","brown","cow"] },
  // 8: Track 23 - Missing words dictation
  { track:23, title:"Listening: Missing Words", page:"Workbook p.15",
    type:"dictation", dialogues:[
      {context:"Dialogue 1: Something falls from a tree", gaps:[
        {pre:"Look out! What was that? The", gap:"tree", post:"! It just fell!"},
        {pre:"Wow, that was", gap:"close", post:"!"},
      ]},
      {context:"Dialogue 2: A birthday present", gaps:[
        {pre:"What's Mum going to buy you for your", gap:"birthday", post:"?"},
        {pre:"I haven't got an", gap:"idea", post:"."},
        {pre:"What? Nothing? That's what you bought me last", gap:"year", post:"!"},
      ]},
    ]},
  // 9: Track 24 - Phonics: two ow sounds
  { track:24, title:"Phonics: Two 'ow' sounds", page:"Workbook p.15",
    type:"sort", categories:[
      {name:"Sound 1: /əʊ/ (like 'go')", words:["yellow","bow","window","show","snow"]},
      {name:"Sound 2: /aʊ/ (like 'out')", words:["brown","crown","how","town","now","flower"]},
    ]},
  // 10: Track 25 - Story comprehension
  { track:25, title:"Story: The Secret of the Egyptian Cat", page:"Student's Book pp.16-17",
    type:"story_mc", intro:"Listen to the story about Mr. Benson and the gold cat statue, then answer the questions.",
    questions:[
      {q:"What was Mr. Benson's job?", opts:["A teacher","A museum director","A policeman"], ans:"A museum director"},
      {q:"What was his favourite object?", opts:["A gold cat statue","A diamond necklace","An old sword"], ans:"A gold cat statue"},
      {q:"Where was the statue from?", opts:["Greece","Egypt","Rome"], ans:"Egypt"},
      {q:"What happened one night?", opts:["The alarm broke","The statue disappeared","The museum burned"], ans:"The statue disappeared"},
      {q:"Who solved the mystery?", opts:["The police","Mr. Benson","Cleo, his daughter"], ans:"Cleo, his daughter"},
      {q:"What was the secret?", opts:["Someone stole it","The cat went outside at night","It was a fake"], ans:"The cat went outside at night"},
    ]},
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let current = 0;
let done = new Array(EXERCISES.length).fill(false);
let spellState = {};

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function init(){
  buildTabs();
  const main = document.getElementById('main');
  main.innerHTML = '';
  EXERCISES.forEach((ex,i) => {
    const div = document.createElement('section');
    div.className = 'ex'; div.id = 'ex-'+i;
    div.innerHTML = `
      <div class="ex-head">
        <div class="ex-num">${i+1}</div>
        <div><h2>${ex.title}</h2><small>🎵 CD1 Track ${ex.track} · ${ex.page}</small></div>
      </div>
      <div class="ex-body">
        <div class="audio-wrap">
          <div class="audio-label">🎧 Listen to Track ${ex.track}:</div>
          <audio controls preload="none"><source src="audio/${ex.track}.mp3" type="audio/mpeg"></audio>
        </div>
        <div id="content-${i}"></div>
        <div class="fb" id="fb-${i}"></div>
        <div class="nav">
          <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>◀ Previous</button>
          <button class="nav-btn fwd" onclick="${i===EXERCISES.length-1?'showResults()':'go('+(i+1)+')'}">${i===EXERCISES.length-1?'🏆 Results':'Next ▶'}</button>
        </div>
      </div>`;
    main.appendChild(div);
  });
  EXERCISES.forEach((ex,i) => renderExercise(ex,i));
  go(0);
}

function buildTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  for(let i=0;i<EXERCISES.length;i++){
    const t = document.createElement('button');
    t.className = 'tab'+(i===current?' active':'')+(done[i]?' done':'');
    t.textContent = i+1;
    t.onclick = ()=>go(i);
    tabs.appendChild(t);
  }
}

function go(n){
  if(n<0||n>=EXERCISES.length) return;
  document.querySelectorAll('.ex').forEach(e=>e.classList.remove('show'));
  document.getElementById('ex-'+n).classList.add('show');
  document.getElementById('results').style.display='none';
  current=n; buildTabs();
  window.scrollTo({top:0,behavior:'smooth'});
}

function setFb(i,cls,msg){const el=document.getElementById('fb-'+i);el.className='fb '+cls;el.innerHTML=msg;}
function markDone(i){if(!done[i]){done[i]=true;document.getElementById('sc').textContent=done.filter(Boolean).length;buildTabs();}}

// ═══════════════════════════════════════
// EXERCISE RENDERERS
// ═══════════════════════════════════════
function renderExercise(ex,i){
  const el = document.getElementById('content-'+i);
  switch(ex.type){
    case 'spell': renderSpell(ex,i,el); break;
    case 'mc': renderMC(ex,i,el); break;
    case 'listen': renderListen(ex,i,el); break;
    case 'gap': renderGap(ex,i,el); break;
    case 'match': renderMatch(ex,i,el); break;
    case 'tf': renderTF(ex,i,el); break;
    case 'listen_repeat': renderListenRepeat(ex,i,el); break;
    case 'dictation': renderDictation(ex,i,el); break;
    case 'sort': renderSort(ex,i,el); break;
    case 'story_mc': renderStoryMC(ex,i,el); break;
  }
}

// --- SPELL (Track 14) ---
function renderSpell(ex,i,el){
  spellState[i] = {wordIdx:0, slotIdx:0};
  el.innerHTML = `
    <div class="instruct">Listen to each word, then spell it by clicking the letters below. Complete all 10 words!</div>
    <div style="text-align:center;margin-bottom:8px;font-size:.85em;color:#888;">Word <span id="sp-count-${i}">1</span> of ${ex.words.length}</div>
    <div id="sp-word-${i}" style="text-align:center;font-size:1.8em;margin-bottom:6px;">🎯</div>
    <div class="spell-area" id="sp-slots-${i}"></div>
    <div class="letter-bank" id="sp-bank-${i}"></div>
    <button class="btn" id="sp-skip-${i}" onclick="spellSkip(${i})">Skip →</button>`;
  loadSpellWord(ex,i);
}

function loadSpellWord(ex,i){
  const st = spellState[i];
  const word = ex.words[st.wordIdx];
  st.slotIdx = 0;
  document.getElementById('sp-count-'+i).textContent = st.wordIdx+1;
  document.getElementById('sp-word-'+i).textContent = '❓ Word '+(st.wordIdx+1);
  // slots
  const slotsEl = document.getElementById('sp-slots-'+i);
  slotsEl.innerHTML = '';
  for(let c of word){
    if(c===' '){slotsEl.innerHTML+='<div class="spell-slot space"></div>';}
    else{slotsEl.innerHTML+=`<div class="spell-slot" id="ss-${i}-${slotsEl.querySelectorAll('.spell-slot:not(.space)').length}"></div>`;}
  }
  // Rebuild slots with proper IDs
  slotsEl.innerHTML = '';
  let idx=0;
  for(let c of word){
    if(c===' '){const d=document.createElement('div');d.className='spell-slot space';slotsEl.appendChild(d);}
    else{const d=document.createElement('div');d.className='spell-slot';d.id=`ss-${i}-${idx}`;slotsEl.appendChild(d);idx++;}
  }
  // letter bank - word letters shuffled + some extras
  const letters = word.replace(/ /g,'').split('');
  const extras = 'abcdefghijklmnopqrstuvwxyz'.split('').filter(l=>!letters.includes(l)).sort(()=>Math.random()-.5).slice(0,4);
  const bank = [...letters,...extras].sort(()=>Math.random()-.5);
  const bankEl = document.getElementById('sp-bank-'+i);
  bankEl.innerHTML = '';
  bank.forEach((l,li)=>{
    const b = document.createElement('button');
    b.className='letter-btn'; b.textContent=l.toUpperCase(); b.id=`lb-${i}-${li}`;
    b.onclick=()=>spellPick(ex,i,l,li);
    bankEl.appendChild(b);
  });
}

function spellPick(ex,i,letter,btnIdx){
  const st = spellState[i];
  const word = ex.words[st.wordIdx];
  const plain = word.replace(/ /g,'');
  if(st.slotIdx >= plain.length) return;
  const correct = plain[st.slotIdx];
  const slot = document.getElementById(`ss-${i}-${st.slotIdx}`);
  if(letter === correct){
    slot.textContent = letter.toUpperCase();
    slot.className = 'spell-slot filled';
    document.getElementById(`lb-${i}-${btnIdx}`).classList.add('used');
    st.slotIdx++;
    if(st.slotIdx >= plain.length){
      document.getElementById('sp-word-'+i).textContent = '✅ ' + word;
      setTimeout(()=>spellNext(ex,i),800);
    }
  } else {
    slot.className = 'spell-slot wrong';
    setTimeout(()=>{slot.className='spell-slot';},500);
  }
}

function spellSkip(i){const ex=EXERCISES[i]; spellNext(ex,i);}

function spellNext(ex,i){
  const st = spellState[i];
  st.wordIdx++;
  if(st.wordIdx >= ex.words.length){
    setFb(i,'ok','🎉 All 10 words completed!');
    markDone(i);
  } else { loadSpellWord(ex,i); }
}

// --- MULTIPLE CHOICE (Track 16, also used for story) ---
function renderMC(ex,i,el){
  let html = `<div class="instruct">Choose the correct answer for each sentence.</div>`;
  ex.items.forEach((item,qi)=>{
    html += `<div class="mc-item" id="mc-${i}-${qi}"><div class="mc-q">${qi+1}. ${item.q}</div><div class="mc-opts">`;
    item.opts.forEach(o=>{html+=`<button class="mc-opt" onclick="mcPick(${i},${qi},'${o}',this)">${o}</button>`;});
    html += `</div></div>`;
  });
  html += `<button class="btn" onclick="chkMC(${i})">✓ Check</button>`;
  el.innerHTML = html;
}

function mcPick(i,qi,val,btn){
  const row=document.getElementById(`mc-${i}-${qi}`);
  row.querySelectorAll('.mc-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  row.dataset.ans = val;
}

function chkMC(i){
  const ex=EXERCISES[i]; let ok=0;
  ex.items.forEach((item,qi)=>{
    const row=document.getElementById(`mc-${i}-${qi}`);
    const chosen=row.dataset.ans;
    row.querySelectorAll('.mc-opt').forEach(b=>{
      if(b.textContent===item.ans)b.classList.add('right');
      if(b.classList.contains('sel')&&b.textContent!==item.ans)b.classList.add('wrong');
    });
    if(chosen===item.ans)ok++;
  });
  if(ok===ex.items.length){setFb(i,'ok',`🎉 Perfect! ${ok}/${ex.items.length} correct!`);markDone(i);}
  else setFb(i,'part',`👍 ${ok}/${ex.items.length} correct. Green shows the right answer.`);
}

// --- LISTEN & SELECT (Track 18) ---
function renderListen(ex,i,el){
  const all = [...ex.objects,...ex.distractors].sort(()=>Math.random()-.5);
  let html = `<div class="instruct">${ex.text}</div><div class="vocab-grid">`;
  all.forEach(w=>{html+=`<div class="vocab-card" id="lc-${i}-${w.replace(/ /g,'_')}" onclick="toggleListen(${i},'${w.replace(/ /g,'_')}')"><span class="word">${w}</span></div>`;});
  html += `</div><button class="btn" onclick="chkListen(${i})">✓ Check</button>`;
  el.innerHTML = html;
}

function toggleListen(i,w){
  const el=document.getElementById(`lc-${i}-${w}`);
  el.classList.toggle('revealed');
}

function chkListen(i){
  const ex=EXERCISES[i]; let ok=0,wrong=0;
  ex.objects.forEach(w=>{
    const el=document.getElementById(`lc-${i}-${w.replace(/ /g,'_')}`);
    if(el.classList.contains('revealed'))ok++;
  });
  ex.distractors.forEach(w=>{
    const el=document.getElementById(`lc-${i}-${w.replace(/ /g,'_')}`);
    if(el.classList.contains('revealed'))wrong++;
  });
  if(ok===ex.objects.length&&wrong===0){setFb(i,'ok','🎉 Perfect! You found all the museum objects!');markDone(i);}
  else setFb(i,'part',`👍 ${ok}/${ex.objects.length} correct objects found. ${wrong} wrong selections.`);
}

// --- GAP FILL (Track 19) ---
function renderGap(ex,i,el){
  const bank = ex.sentences.map(s=>s.gap).sort(()=>Math.random()-.5);
  let html = `<div class="instruct">Listen and complete each sentence with the correct pronoun (me, him, her, us, them).</div>`;
  html += `<div class="word-bank">${bank.map(w=>`<button class="wb-btn" onclick="selectWB(this)">${w}</button>`).join('')}</div>`;
  ex.sentences.forEach((s,si)=>{
    html += `<div class="gap-sentence">${si+1}. ${s.pre} <input class="gap-input" id="gi-${i}-${si}" data-ans="${s.gap}" readonly placeholder="___" onclick="fillGap(${i},${si})"> ${s.post}</div>`;
  });
  html += `<button class="btn" onclick="chkGap(${i})">✓ Check</button>`;
  el.innerHTML = html;
}

let selectedWB = null;
function selectWB(btn){
  document.querySelectorAll('.wb-btn').forEach(b=>b.classList.remove('sel'));
  if(selectedWB===btn){selectedWB=null;return;}
  selectedWB=btn; btn.classList.add('sel');
}

function fillGap(i,si){
  if(!selectedWB)return;
  const inp=document.getElementById(`gi-${i}-${si}`);
  inp.value=selectedWB.textContent;
  selectedWB.classList.add('used');
  selectedWB.classList.remove('sel');
  selectedWB=null;
}

function chkGap(i){
  const ex=EXERCISES[i]; let ok=0;
  ex.sentences.forEach((s,si)=>{
    const inp=document.getElementById(`gi-${i}-${si}`);
    if(inp.value.trim().toLowerCase()===s.gap){inp.classList.add('ok');ok++;}
    else{inp.classList.add('bad');}
  });
  if(ok===ex.sentences.length){setFb(i,'ok','🎉 All correct!');markDone(i);}
  else setFb(i,'part',`👍 ${ok}/${ex.sentences.length} correct.`);
}

// --- MATCH (Track 20) ---
function renderMatch(ex,i,el){
  let html = `<div class="instruct">Match each object with the correct pronoun. Listen to check!</div>`;
  const shuffledProns = ex.pairs.map(p=>p.pron).sort(()=>Math.random()-.5);
  html += `<div style="margin:10px 0;">`;
  ex.pairs.forEach((p,pi)=>{
    html += `<div class="gap-sentence">${pi+1}. Give <select class="gap-input" id="ms-${i}-${pi}" style="width:80px;border:2px solid var(--gold);border-radius:6px;padding:3px;cursor:pointer;"><option value="">---</option>${['me','him','her','us','them'].map(pr=>`<option value="${pr}">${pr}</option>`).join('')}</select> ${p.obj}, please.</div>`;
  });
  html += `</div><button class="btn" onclick="chkMatch(${i})">✓ Check</button>`;
  el.innerHTML = html;
}

function chkMatch(i){
  const ex=EXERCISES[i]; let ok=0;
  ex.pairs.forEach((p,pi)=>{
    const sel=document.getElementById(`ms-${i}-${pi}`);
    if(sel.value===p.pron){sel.classList.add('ok');ok++;}
    else{sel.classList.add('bad');}
  });
  if(ok===ex.pairs.length){setFb(i,'ok','🎉 Perfect matching!');markDone(i);}
  else setFb(i,'part',`👍 ${ok}/${ex.pairs.length} correct.`);
}

// --- TRUE/FALSE (Track 21) ---
function renderTF(ex,i,el){
  let html = `<div class="instruct">${ex.intro}</div>`;
  ex.items.forEach((item,qi)=>{
    html += `<div class="tf-row" id="tf-${i}-${qi}"><div class="tf-q">${qi+1}. ${item.q}</div><button class="tf-btn tf-t" onclick="tfPick(${i},${qi},true,this)">T</button><button class="tf-btn tf-f" onclick="tfPick(${i},${qi},false,this)">F</button></div>`;
  });
  html += `<button class="btn" onclick="chkTF(${i})">✓ Check</button>`;
  el.innerHTML = html;
}

function tfPick(i,qi,val,btn){
  const row=document.getElementById(`tf-${i}-${qi}`);
  row.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  row.dataset.ans = val;
}

function chkTF(i){
  const ex=EXERCISES[i]; let ok=0;
  ex.items.forEach((item,qi)=>{
    const row=document.getElementById(`tf-${i}-${qi}`);
    const ans = row.dataset.ans === 'true';
    if(row.dataset.ans===undefined) return;
    if(ans===item.ans){row.classList.add('ok');ok++;}
    else{row.classList.add('bad');}
  });
  if(ok===ex.items.length){setFb(i,'ok','🎉 All correct!');markDone(i);}
  else setFb(i,'part',`👍 ${ok}/${ex.items.length} correct.`);
}

// --- LISTEN & REPEAT (Track 22) ---
function renderListenRepeat(ex,i,el){
  let html = `<div class="instruct">${ex.text}</div><div class="vocab-grid">`;
  ex.words.forEach(w=>{html+=`<div class="vocab-card" onclick="speakWord('${w}')"><span class="emoji">🔊</span><span class="word">${w}</span></div>`;});
  html += `</div><p style="font-size:.85em;color:#888;margin-top:8px;">Click each word to hear it (uses browser speech). Practice saying them aloud!</p>`;
  html += `<button class="btn" onclick="markDone(${i});setFb(${i},'ok','✅ Great practice! Keep repeating these words.')">✓ Done Practicing</button>`;
  el.innerHTML = html;
}

function speakWord(w){
  const u=new SpeechSynthesisUtterance(w);
  u.lang='en-GB';u.rate=0.75;u.pitch=1.1;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

// --- DICTATION (Track 23) ---
function renderDictation(ex,i,el){
  let html = `<div class="instruct">Listen carefully and type the missing words you hear.</div>`;
  let gIdx=0;
  ex.dialogues.forEach((dlg,di)=>{
    html += `<div style="font-weight:600;margin:10px 0 6px;font-size:.85em;color:var(--navy);">${dlg.context}</div>`;
    dlg.gaps.forEach(g=>{
      html += `<div class="gap-sentence">${g.pre} <input class="gap-input" id="di-${i}-${gIdx}" data-ans="${g.gap}" placeholder="___"> ${g.post}</div>`;
      gIdx++;
    });
  });
  html += `<button class="btn" onclick="chkDictation(${i},${gIdx})">✓ Check</button>`;
  el.innerHTML = html;
}

function chkDictation(i,total){
  let ok=0;
  for(let g=0;g<total;g++){
    const inp=document.getElementById(`di-${i}-${g}`);
    if(inp.value.trim().toLowerCase()===inp.dataset.ans.toLowerCase()){inp.classList.add('ok');ok++;}
    else{inp.classList.add('bad');}
  }
  if(ok===total){setFb(i,'ok','🎉 Perfect dictation!');markDone(i);}
  else setFb(i,'part',`👍 ${ok}/${total} correct.`);
}

// --- SORT (Track 24) ---
function renderSort(ex,i,el){
  const allWords = ex.categories.flatMap(c=>c.words).sort(()=>Math.random()-.5);
  let html = `<div class="instruct">Sort the words by their 'ow' sound. Click a word, then click the correct box.</div>`;
  html += `<div class="word-bank" id="sortbank-${i}">`;
  allWords.forEach((w,wi)=>{html+=`<button class="wb-btn" id="sw-${i}-${wi}" data-w="${w}" onclick="selectSort(${i},${wi})">${w}</button>`;});
  html += `</div><div class="sort-container">`;
  ex.categories.forEach((cat,ci)=>{
    html += `<div class="sort-box" id="sbox-${i}-${ci}" onclick="placeSort(${i},${ci})"><h4>${cat.name}</h4></div>`;
  });
  html += `</div><button class="btn" onclick="chkSort(${i})">✓ Check</button>`;
  el.innerHTML = html;
  window['sortSel'+i] = null;
  window['sortPlaced'+i] = {};
}

function selectSort(i,wi){
  const btn=document.getElementById(`sw-${i}-${wi}`);
  if(btn.classList.contains('used'))return;
  document.querySelectorAll(`#sortbank-${i} .wb-btn`).forEach(b=>b.classList.remove('sel'));
  window['sortSel'+i]={wi,word:btn.dataset.w};
  btn.classList.add('sel');
}

function placeSort(i,ci){
  const sel=window['sortSel'+i];
  if(!sel)return;
  const box=document.getElementById(`sbox-${i}-${ci}`);
  const tag=document.createElement('span');tag.className='sort-tag';tag.textContent=sel.word;
  box.appendChild(tag);
  document.getElementById(`sw-${i}-${sel.wi}`).classList.add('used');
  document.getElementById(`sw-${i}-${sel.wi}`).classList.remove('sel');
  if(!window['sortPlaced'+i])window['sortPlaced'+i]={};
  window['sortPlaced'+i][sel.word]=ci;
  window['sortSel'+i]=null;
}

function chkSort(i){
  const ex=EXERCISES[i]; let ok=0,total=0;
  ex.categories.forEach((cat,ci)=>{
    cat.words.forEach(w=>{total++;if(window['sortPlaced'+i][w]===ci)ok++;});
  });
  if(ok===total){setFb(i,'ok','🎉 All words sorted correctly!');markDone(i);}
  else setFb(i,'part',`👍 ${ok}/${total} correct.`);
}

// --- RESULTS ---
function showResults(){
  document.querySelectorAll('.ex').forEach(e=>e.classList.remove('show'));
  const res=document.getElementById('results');res.style.display='block';
  const sc=done.filter(Boolean).length;
  const p=sc/EXERCISES.length;
  const [icon,title,stars,msg]=p>=.9?['🏆','Museum Expert!',5,'Outstanding work!']:p>=.7?['🌟','Great Job!',4,'Really well done!']:p>=.5?['😊','Good Effort!',3,'Keep practising!']:p>=.25?['👍','Keep Going!',2,'Try the exercises again!']:['💪','Don\'t Give Up!',1,'Listen again and try!'];
  document.getElementById('ri').textContent=icon;
  document.getElementById('rt').textContent=title;
  document.getElementById('rs').textContent='⭐'.repeat(stars)+'☆'.repeat(5-stars);
  document.getElementById('rsc').textContent=`${sc} / ${EXERCISES.length} exercises completed`;
  document.getElementById('rm').textContent=msg;
}
